<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата — XStreamka Dev</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border-radius: 12px; padding: 2rem; max-width: 420px; width: 100%; margin: 1rem; }
        .logo { text-align: center; color: #38bdf8; font-weight: bold; font-size: 1.4rem; margin-bottom: 1.5rem; }
        .divider { border-top: 1px solid #334155; margin: 1.2rem 0; }
        .row { display: flex; justify-content: space-between; margin-bottom: 0.6rem; }
        .label { color: #94a3b8; }
        .value { font-weight: 500; }
        .total { font-size: 2rem; font-weight: bold; color: #38bdf8; text-align: center; margin: 1.5rem 0; }
        .btn { display: block; width: 100%; padding: 0.8rem; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; text-align: center; text-decoration: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-secondary { background: transparent; color: #94a3b8; margin-top: 0.8rem; font-size: 0.9rem; border: none; cursor: pointer; width: 100%; }
        .btn-secondary:hover { color: #e2e8f0; }
        .secure { text-align: center; color: #64748b; font-size: 0.8rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">XStreamka Dev</div>

        <div class="row">
            <span class="label">Услуга</span>
            <span class="value">{{.Payment.Description}}</span>
        </div>
        <div class="row">
            <span class="label">Тариф</span>
            <span class="value">{{.Payment.PlanID}}</span>
        </div>
        {{if .Payment.Email}}
        <div class="row">
            <span class="label">Email</span>
            <span class="value">{{.Payment.Email}}</span>
        </div>
        {{end}}

        <div class="divider"></div>
        <div class="total">{{printf "%.0f" .Payment.Amount}} ₽</div>

        <a href="{{.RobokassaURL}}" class="btn btn-primary">Перейти к оплате</a>

        <form method="POST" action="/pay/order/{{.Payment.InvID}}/cancel" style="margin: 0;">
            <button type="submit" class="btn btn-secondary"
                    onclick="return confirm('Отменить заказ и вернуться к выбору тарифа?');">
                ← Отменить
            </button>
        </form>

        <div class="secure">🔒 Безопасная оплата через Робокассу</div>
    </div>
</body>
</html>
